<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制造业设备管理系统 - 原型演示</title>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --warning: #faad14; --danger: #f5222d; --bg: #f0f2f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; }
        
        /* 侧边栏 */
        .sidebar { width: 220px; background: #001529; color: #fff; padding: 20px 0; }
        .logo { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 30px; }
        .menu-item { padding: 12px 24px; cursor: pointer; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: var(--primary); }
        
        /* 主内容区 */
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        .card { background: #fff; border-radius: 4px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* IoT 看板样式 */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .stat-card { text-align: center; padding: 20px; border-radius: 4px; color: #fff; }
        .stat-num { font-size: 32px; font-weight: bold; }
        .online { background: var(--success); } .offline { background: var(--danger); }
        .warning { background: var(--warning); } .total { background: var(--primary); }
        
        /* 离线巡检移动端模拟 */
        .mobile-shell { width: 375px; height: 667px; background: #fff; border: 12px solid #333; border-radius: 30px; margin: 0 auto; position: relative; overflow: hidden; }
        .app-header { background: var(--primary); color: #fff; padding: 15px; text-align: center; font-weight: bold; }
        .offline-banner { background: var(--danger); color: #fff; text-align: center; padding: 5px; font-size: 12px; display: none; }
        .task-list { padding: 10px; }
        .task-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .sync-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: var(--success); }
        
        /* 状态切换开关 */
        .toggle-container { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🏭 智造 EAM</div>
        <div class="menu-item active" onclick="showView('iot')">📊 IoT 监控中心</div>
        <div class="menu-item" onclick="showView('inspect')">📱 离线巡检 (App)</div>
        <div class="menu-item">🛠️ 维修工单</div>
        <div class="menu-item">📦 备件库存</div>
    </div>

    <div class="main">
        <!-- IoT 监控视图 -->
        <div id="view-iot">
            <div class="header"><h2>实时生产监控看板</h2><span style="color: #888;">数据更新频率: 5分钟聚合</span></div>
            <div class="dashboard-grid">
                <div class="stat-card total"><div class="stat-num">128</div><div>设备总数</div></div>
                <div class="stat-card online"><div class="stat-num">115</div><div>在线运行</div></div>
                <div class="stat-card warning"><div class="stat-num">8</div><div>预警中</div></div>
                <div class="stat-card offline"><div class="stat-num">5</div><div>离线停机</div></div>
            </div>
            <div class="card" style="margin-top: 20px;">
                <h3>关键设备参数趋势 (CNC-001)</h3>
                <div style="height: 200px; background: #fafafa; display: flex; align-items: center; justify-content: center; color: #999;">
                    [此处为简道云仪表盘组件：温度/振动实时曲线]
                </div>
            </div>
        </div>

        <!-- 离线巡检视图 -->
        <div id="view-inspect" style="display: none;">
            <div class="header"><h2>移动端离线巡检模拟</h2></div>
            <div class="toggle-container">
                <label><input type="checkbox" id="net-toggle" onchange="toggleNetwork()"> 模拟断网环境</label>
            </div>
            <br>
            <div class="mobile-shell">
                <div class="app-header">日常点检任务</div>
                <div class="offline-banner" id="offline-msg">⚠️ 当前处于离线模式，数据已缓存</div>
                <div class="task-list">
                    <div class="task-item">
                        <div><strong>冲压车间 A区</strong><br><small>待检项: 12 | 截止时间: 18:00</small></div>
                        <button class="btn">开始</button>
                    </div>
                    <div class="task-item">
                        <div><strong>装配线 B区</strong><br><small>待检项: 8 | 截止时间: 17:30</small></div>
                        <button class="btn">开始</button>
                    </div>
                </div>
                <button class="btn sync-btn" id="sync-btn" style="display: none;" onclick="alert('网络恢复！正在同步 2 条离线记录...')">同步离线数据</button>
            </div>
        </div>
    </div>

    <script>
        function showView(view) {
            document.getElementById('view-iot').style.display = view === 'iot' ? 'block' : 'none';
            document.getElementById('view-inspect').style.display = view === 'inspect' ? 'block' : 'none';
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }
        function toggleNetwork() {
            const isOffline = document.getElementById('net-toggle').checked;
            document.getElementById('offline-msg').style.display = isOffline ? 'block' : 'none';
            document.getElementById('sync-btn').style.display = isOffline ? 'block' : 'none';
        }
    </script>
</body>
</html>
