<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的OKR - 云梦泽 OKR</title>
<style>
:root {
  --primary: #00b899; --primary-dark: #00937a; --primary-light: #e6f8f5; --primary-50: #e6f8f5;
  --green: #34c759; --green-light: #f0fdf4; --green-dark: #16a34a;
  --yellow: #f5a623; --yellow-light: #fffbeb;
  --red: #ff3b30; --red-light: #fef2f2;
  --purple: #7c3aed; --purple-light: #f5f3ff;
  --cyan: #06b6d4; --cyan-light: #ecfeff;
  --blue: #3370ff; --blue-light: #eff6ff;
  --text-1: #1f2329; --text-2: #646a73; --text-3: #8f959e; --text-4: #b4b8bf;
  --bg-0: #f5f6f7; --bg-1: #ffffff; --bg-2: #f9fafb; --bg-3: #f0f1f2;
  --border-1: #dee0e3; --border-2: #e8eaed; --border-3: #f0f1f2;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06); --shadow: 0 2px 8px rgba(0,0,0,.08); --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  --r: 4px; --r-sm: 4px; --r-lg: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-0);color:var(--text-1);font-size:14px;line-height:1.6;}
html,body{width:100%;overflow-x:hidden;}

/* Layout */
.page-wrap{max-width:960px;margin:0 auto;padding:20px 16px 60px;}

/* Header */
.page-header{margin-bottom:20px;}
.page-header h1{font-size:22px;font-weight:800;margin-bottom:2px;}
.page-header .sub{font-size:13px;color:var(--text-3);}
.page-header .sub .hl{color:var(--primary);font-weight:600;}

/* KPI Strip */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.kpi-item{background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow-sm);}
.kpi-item.accent{border-left:4px solid var(--primary);}
.kpi-label{font-size:11px;color:var(--text-3);font-weight:600;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px;}
.kpi-val{font-size:24px;font-weight:800;line-height:1.2;}
.kpi-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* Filter Bar */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.cycle-tabs{display:flex;gap:2px;background:var(--bg-2);border-radius:var(--r);padding:3px;border:1px solid var(--border-2);}
.cycle-btn{padding:6px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-2);transition:all .15s;}
.cycle-btn:hover{color:var(--text-1);background:var(--bg-1);}
.cycle-btn.active{background:var(--bg-1);color:var(--primary);font-weight:600;box-shadow:var(--shadow-sm);}
.search-box{position:relative;flex:1;min-width:180px;max-width:320px;}
.search-box input{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border-1);border-radius:var(--r-sm);font-size:13px;background:var(--bg-1);transition:all .15s;color:var(--text-1);}
.search-box input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(0,184,153,.1);}
.search-box .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:13px;pointer-events:none;}
.filter-info{font-size:12px;color:var(--text-3);margin-left:auto;}

/* O Card */
.okr-card{background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--r-lg);padding:18px;margin-bottom:14px;transition:all .2s;position:relative;overflow:hidden;cursor:pointer;}
.okr-card:hover{box-shadow:var(--shadow);border-color:var(--border-1);}
.okr-card::after{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;border-radius:0 var(--r-lg) var(--r-lg) 0;transition:background .2s;}
.okr-card.status-normal::after{background:var(--green);}
.okr-card.status-watch::after{background:var(--yellow);}
.okr-card.status-behind::after{background:var(--red);}
.okr-card.status-draft::after{background:var(--text-4);}

.o-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
.o-ring{flex-shrink:0;}
.o-info{flex:1;min-width:0;}
.o-title{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.4;}
.o-title a{color:var(--text-1);text-decoration:none;transition:color .15s;}
.o-title a:hover{color:var(--primary);}
.o-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-3);flex-wrap:wrap;}
.o-meta .mi{display:flex;align-items:center;gap:3px;}
.o-actions{display:flex;gap:4px;flex-shrink:0;}
.o-score-badge{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-size:13px;font-weight:800;color:#fff;}
.o-score-badge.high{background:linear-gradient(135deg,#34c759,#16a34a);}
.o-score-badge.mid{background:linear-gradient(135deg,#f5a623,#d97706);}
.o-score-badge.low{background:linear-gradient(135deg,#ff3b30,#dc2626);}
.o-score-badge.none{background:var(--border-1);color:var(--text-3);}
.o-num{font-size:11px;color:var(--text-3);font-family:monospace;background:var(--bg-3);padding:1px 6px;border-radius:3px;letter-spacing:.3px;margin-left:6px;}

/* KR List */
.kr-list{border-top:1px solid var(--border-3);padding-top:10px;margin-top:2px;}
.kr-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);transition:all .15s;margin-bottom:2px;cursor:pointer;}
.kr-row:hover{background:var(--bg-2);}
.kr-bar-wrap{flex:1;}
.kr-name{font-size:13px;font-weight:500;margin-bottom:2px;}
.kr-vals{font-size:11px;color:var(--text-3);margin-top:2px;}
.kr-bar{height:6px;background:var(--border-2);border-radius:3px;overflow:hidden;margin-top:3px;}
.kr-fill{height:100%;border-radius:3px;transition:width .5s;}
.kr-fill.g{background:linear-gradient(90deg,#4ade80,#16a34a);}
.kr-fill.y{background:linear-gradient(90deg,#fbbf24,#d97706);}
.kr-fill.r{background:linear-gradient(90deg,#f87171,#dc2626);}
.kr-fill.b{background:linear-gradient(90deg,#60a5fa,#3370ff);}
.kr-pct{font-size:14px;font-weight:700;min-width:44px;text-align:right;}
.kr-pct.g{color:var(--green-dark);}.kr-pct.y{color:var(--yellow);}.kr-pct.r{color:var(--red);}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.tg-g{background:var(--green-light);color:var(--green-dark);}
.tg-y{background:var(--yellow-light);color:#92400e;}
.tg-r{background:var(--red-light);color:var(--red);}
.tg-b{background:var(--primary-light);color:var(--primary);}
.tg-p{background:var(--purple-light);color:var(--purple);}
.tg-c{background:var(--cyan-light);color:var(--cyan);}
.tg-gray{background:var(--bg-3);color:var(--text-2);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;}
.dot.g{background:var(--green);}.dot.y{background:var(--yellow);}.dot.r{background:var(--red);}

/* Progress Ring */
.pr{transform:rotate(-90deg);}
.pr-bg{fill:none;stroke:var(--border-2);stroke-width:5;}
.pr-fl{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s;}
.pr-t{font-size:13px;font-weight:800;fill:var(--text-1);text-anchor:middle;dominant-baseline:central;}

/* Buttons */
.btn{padding:7px 16px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;border:1px solid var(--border-1);background:var(--bg-1);color:var(--text-1);transition:all .15s;font-weight:500;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{background:var(--bg-2);}
.btn-p{background:var(--primary);color:#fff;border-color:var(--primary);}.btn-p:hover{background:var(--primary-dark);}
.btn-o{background:transparent;border-color:var(--primary);color:var(--primary);}.btn-o:hover{background:var(--primary-light);}
.btn-g{background:transparent;border-color:transparent;color:var(--text-2);}.btn-g:hover{background:var(--bg-3);color:var(--text-1);}
.btn-sm{padding:4px 10px;font-size:12px;}

/* Link Icon */
.link-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--bg-3);color:var(--text-3);font-size:12px;transition:all .15s;flex-shrink:0;}
.kr-row:hover .link-icon,.okr-card:hover .o-actions .link-icon{background:var(--primary-light);color:var(--primary);}

/* States */
.state-box{text-align:center;padding:60px 20px;}
.state-box .icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.state-box h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text-2);}
.state-box p{font-size:13px;color:var(--text-3);max-width:360px;margin:0 auto 20px;}
.spinner{width:36px;height:36px;border:3px solid var(--border-2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:fadeIn .3s ease;}

/* Tooltip */
[data-tip]{position:relative;}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1d24;color:#e2e8f0;padding:4px 10px;border-radius:5px;font-size:11px;white-space:nowrap;z-index:100;pointer-events:none;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* Responsive */
@media(max-width:640px){
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .filter-bar{flex-direction:column;align-items:stretch;}
  .search-box{max-width:100%;}
  .filter-info{margin-left:0;}
  .o-head{flex-wrap:wrap;}
  .o-actions{width:100%;justify-content:flex-end;margin-top:8px;}
}
</style>
</head>
<body>

<div class="page-wrap">
  <!-- Header -->
  <div class="page-header">
    <h1 id="page-title">我的 OKR</h1>
    <p class="sub" id="page-sub">正在加载...</p>
  </div>

  <!-- KPI Strip -->
  <div class="kpi-strip" id="kpi-strip" style="display:none;">
    <div class="kpi-item accent"><div class="kpi-label">目标总数</div><div class="kpi-val" id="kpi-total">-</div><div class="kpi-sub" id="kpi-total-sub">个 O</div></div>
    <div class="kpi-item"><div class="kpi-label">整体进度</div><div class="kpi-val" id="kpi-progress" style="color:var(--primary);">-</div><div class="kpi-sub" id="kpi-progress-sub">KR 加权平均</div></div>
    <div class="kpi-item"><div class="kpi-label">正常</div><div class="kpi-val" id="kpi-normal" style="color:var(--green);">-</div><div class="kpi-sub">个 KR</div></div>
    <div class="kpi-item"><div class="kpi-label">关注</div><div class="kpi-val" id="kpi-watch" style="color:var(--yellow);">-</div><div class="kpi-sub">个 KR</div></div>
    <div class="kpi-item"><div class="kpi-label">落后</div><div class="kpi-val" id="kpi-behind" style="color:var(--red);">-</div><div class="kpi-sub">个 KR</div></div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filter-bar" style="display:none;">
    <div class="cycle-tabs" id="cycle-tabs">
      <button class="cycle-btn active" data-cycle="">全部</button>
    </div>
    <div class="search-box">
      <span class="icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="搜索目标名称或 KR..." oninput="onSearch(this.value)">
    </div>
    <span class="filter-info" id="filter-info"></span>
  </div>

  <!-- Content Area -->
  <div id="content-area">
    <!-- Loading State -->
    <div class="state-box" id="state-loading">
      <div class="spinner"></div>
      <h3>正在加载 OKR 数据</h3>
      <p>从简道云获取目标和关键结果...</p>
    </div>
  </div>
</div>

<script>
// ===== Configuration =====
var CONFIG = {
  API_BASE: window.location.origin,  // 同源：Bridge 服务地址
  APP_ID: '6a2829aa42f13fb09f975991',
  ENTRY_GOAL_TREE: '6a0021768032acf3d1f2ca30',
  ENTRY_KR_LIST: '6a008c543a9e5537040237de',
  JDY_BASE: 'https://www.jiandaoyun.com'
};

// ===== State =====
var state = {
  allGoals: [],
  filteredGoals: [],
  currentCycle: '',
  searchQuery: '',
  cycles: [],
  loading: true
};

// ===== JDY Link Builder =====
function jdyGoalUrl(goalId) {
  return CONFIG.JDY_BASE + '/dashboard/app/' + CONFIG.APP_ID + '/entry/' + CONFIG.ENTRY_GOAL_TREE + '/data/' + goalId;
}
function jdyKrUrl(krId) {
  return CONFIG.JDY_BASE + '/dashboard/app/' + CONFIG.APP_ID + '/entry/' + CONFIG.ENTRY_KR_LIST + '/data/' + krId;
}

// ===== API Client =====
function apiGet(path) {
  return fetch(CONFIG.API_BASE + path).then(function(r) {
    if (!r.ok) throw new Error('API Error: ' + r.status);
    return r.json();
  });
}

// ===== Progress Ring SVG =====
function ringSVG(pct, size, color) {
  size = size || 56;
  var r = (size / 2) - 6;
  var circ = 2 * Math.PI * r;
  var offset = circ * (1 - Math.min(pct, 100) / 100);
  var half = size / 2;
  var label = pct > 0 ? Math.round(pct) + '%' : '-';
  return '<svg width="' + size + '" height="' + size + '" class="pr">' +
    '<circle class="pr-bg" cx="' + half + '" cy="' + half + '" r="' + r + '"/>' +
    '<circle class="pr-fl" cx="' + half + '" cy="' + half + '" r="' + r + '" stroke="' + (color || '#00b899') + '" stroke-dasharray="' + circ.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '"/>' +
    '<text class="pr-t" x="' + half + '" y="' + half + '" transform="rotate(90 ' + half + ' ' + half + ')">' + label + '</text></svg>';
}

// ===== Status Helpers =====
function progressColor(pct) {
  if (pct >= 60) return { cls: 'g', color: '#16a34a' };
  if (pct >= 30) return { cls: 'y', color: '#d97706' };
  return { cls: 'r', color: '#dc2626' };
}

function statusClass(status) {
  if (!status) return 'status-draft';
  var s = String(status);
  if (s.indexOf('落后') >= 0 || s.indexOf('滞后') >= 0) return 'status-behind';
  if (s.indexOf('关注') >= 0 || s.indexOf('需关注') >= 0) return 'status-watch';
  if (s.indexOf('草稿') >= 0) return 'status-draft';
  return 'status-normal';
}

function statusTag(status) {
  if (!status) return '<span class="tag tg-gray">草稿</span>';
  var s = String(status);
  if (s.indexOf('落后') >= 0) return '<span class="tag tg-r"><span class="dot r"></span>落后</span>';
  if (s.indexOf('关注') >= 0) return '<span class="tag tg-y"><span class="dot y"></span>关注</span>';
  if (s.indexOf('草稿') >= 0) return '<span class="tag tg-gray">草稿</span>';
  if (s.indexOf('已完成') >= 0) return '<span class="tag tg-g"><span class="dot g"></span>已完成</span>';
  if (s.indexOf('已关闭') >= 0) return '<span class="tag tg-gray">已关闭</span>';
  return '<span class="tag tg-g"><span class="dot g"></span>' + s + '</span>';
}

function scoreBadge(progress) {
  var p = parseFloat(progress) || 0;
  var score = (p / 100).toFixed(2);
  if (p >= 60) return '<div class="o-score-badge high">' + score + '</div>';
  if (p >= 30) return '<div class="o-score-badge mid">' + score + '</div>';
  if (p > 0) return '<div class="o-score-badge low">' + score + '</div>';
  return '<div class="o-score-badge none">--</div>';
}

// ===== Render Functions =====
function renderKRRow(kr) {
  var pct = parseFloat(kr.progress) || 0;
  var pc = progressColor(pct);
  var name = kr.name || '未命名 KR';
  var startVal = kr.start_value || '0';
  var targetVal = kr.target_value || '-';
  var weight = kr.weight || 0;
  var url = jdyKrUrl(kr.id);

  return '<div class="kr-row" onclick="event.stopPropagation();window.open(\'' + url + '\',\'_blank\')" data-tip="点击查看 KR 详情">' +
    '<div class="kr-bar-wrap">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;">' +
        '<span class="kr-name">' + escHtml(name) + '</span>' +
        '<span class="kr-pct ' + pc.cls + '">' + Math.round(pct) + '%</span>' +
      '</div>' +
      '<div class="kr-bar"><div class="kr-fill ' + pc.cls + '" style="width:' + Math.min(pct, 100) + '%"></div></div>' +
      '<div class="kr-vals">起始 ' + escHtml(String(startVal)) + ' / 目标 ' + escHtml(String(targetVal)) + (weight ? ' / 权重 ' + weight + '%' : '') + '</div>' +
    '</div>' +
    '<span class="link-icon" title="在简道云中打开">&#8599;</span>' +
  '</div>';
}

function renderOCard(goal, idx) {
  var pct = parseFloat(goal.progress) || 0;
  var pc = progressColor(pct);
  var sClass = statusClass(goal.status);
  var name = goal.name || '未命名目标';
  var sn = goal.sn || '';
  var cycle = goal.cycle || '';
  var ownerName = goal.owner_name || '';
  var cate = goal.cate || goal.goal_type || '';
  var weight = goal.weight || 0;
  var krs = goal.krs || [];
  var url = jdyGoalUrl(goal.id);
  var delay = Math.min(idx * 0.05, 0.3);

  var metaParts = [];
  metaParts.push(statusTag(goal.status));
  if (cycle) metaParts.push('<span class="mi">' + escHtml(cycle) + '</span>');
  if (ownerName) metaParts.push('<span class="mi">' + escHtml(ownerName) + '</span>');
  if (cate) metaParts.push('<span class="mi"><span class="tag tg-b">' + escHtml(cate) + '</span></span>');
  if (weight) metaParts.push('<span class="mi">权重 ' + weight + '%</span>');
  if (goal.strategy_title) metaParts.push('<span class="mi" style="color:var(--primary);">对齐: ' + escHtml(goal.strategy_title) + '</span>');

  var krHtml = '';
  if (krs.length > 0) {
    krHtml = '<div class="kr-list">';
    for (var i = 0; i < krs.length; i++) {
      krHtml += renderKRRow(krs[i]);
    }
    krHtml += '</div>';
  } else {
    krHtml = '<div style="padding:10px 0 0;text-align:center;font-size:12px;color:var(--text-4);">暂无 KR</div>';
  }

  return '<div class="okr-card ' + sClass + ' anim" style="animation-delay:' + delay + 's;" onclick="window.open(\'' + url + '\',\'_blank\')" data-tip="点击打开简道云数据详情">' +
    '<div class="o-head">' +
      '<div class="o-ring">' + ringSVG(pct, 56, pc.color) + '</div>' +
      '<div class="o-info">' +
        '<div class="o-title"><a href="' + url + '" target="_blank" onclick="event.stopPropagation()">' + escHtml(name) + '</a>' +
          (sn ? '<span class="o-num">' + escHtml(sn) + '</span>' : '') +
        '</div>' +
        '<div class="o-meta">' + metaParts.join('') + '</div>' +
      '</div>' +
      scoreBadge(pct) +
      '<div class="o-actions">' +
        '<span class="link-icon" title="在简道云中打开">&#8599;</span>' +
      '</div>' +
    '</div>' +
    krHtml +
  '</div>';
}

function renderEmpty() {
  return '<div class="state-box">' +
    '<div class="icon" style="font-size:56px;opacity:.3;">&#128203;</div>' +
    '<h3>暂无 OKR 数据</h3>' +
    '<p>当前筛选条件下没有找到目标数据。请尝试切换周期或清除搜索条件。</p>' +
    '<button class="btn btn-o" onclick="resetFilters()">重置筛选</button>' +
  '</div>';
}

function renderError(msg) {
  return '<div class="state-box">' +
    '<div class="icon" style="font-size:56px;opacity:.3;">&#9888;</div>' +
    '<h3>数据加载失败</h3>' +
    '<p>' + escHtml(msg) + '</p>' +
    '<button class="btn btn-p" onclick="loadData()">重新加载</button>' +
  '</div>';
}

// ===== KPI Calculation =====
function updateKPIs(goals) {
  var totalO = goals.length;
  var totalKR = 0;
  var normalKR = 0;
  var watchKR = 0;
  var behindKR = 0;
  var weightedSum = 0;
  var weightTotal = 0;

  for (var i = 0; i < goals.length; i++) {
    var krs = goals[i].krs || [];
    for (var j = 0; j < krs.length; j++) {
      totalKR++;
      var p = parseFloat(krs[j].progress) || 0;
      var w = parseFloat(krs[j].weight) || 1;
      weightedSum += p * w;
      weightTotal += w;
      if (p >= 60) normalKR++;
      else if (p >= 30) watchKR++;
      else behindKR++;
    }
  }

  var avgProgress = weightTotal > 0 ? Math.round(weightedSum / weightTotal) : 0;

  document.getElementById('kpi-total').textContent = totalO;
  document.getElementById('kpi-total-sub').textContent = '个 O / ' + totalKR + ' 个 KR';
  document.getElementById('kpi-progress').textContent = avgProgress + '%';
  document.getElementById('kpi-progress-sub').textContent = avgProgress >= 60 ? '进展良好' : (avgProgress >= 30 ? '需要关注' : '严重滞后');
  document.getElementById('kpi-normal').textContent = normalKR;
  document.getElementById('kpi-watch').textContent = watchKR;
  document.getElementById('kpi-behind').textContent = behindKR;
}

// ===== Filter & Search =====
function applyFilters() {
  var goals = state.allGoals;
  var cycle = state.currentCycle;
  var query = state.searchQuery.toLowerCase();

  var filtered = goals.filter(function(g) {
    // Cycle filter
    if (cycle && g.cycle !== cycle) return false;
    // Search filter
    if (query) {
      var nameMatch = (g.name || '').toLowerCase().indexOf(query) >= 0;
      var descMatch = (g.desc || '').toLowerCase().indexOf(query) >= 0;
      var krMatch = false;
      var krs = g.krs || [];
      for (var i = 0; i < krs.length; i++) {
        if ((krs[i].name || '').toLowerCase().indexOf(query) >= 0) {
          krMatch = true;
          break;
        }
      }
      if (!nameMatch && !descMatch && !krMatch) return false;
    }
    return true;
  });

  state.filteredGoals = filtered;
  renderGoals(filtered);
  updateKPIs(filtered);
  document.getElementById('filter-info').textContent = '显示 ' + filtered.length + ' / ' + goals.length + ' 个目标';
}

function onCycleClick(cycle) {
  state.currentCycle = cycle;
  // Update active tab
  var btns = document.querySelectorAll('.cycle-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-cycle') === cycle);
  }
  applyFilters();
}

function onSearch(val) {
  state.searchQuery = val;
  applyFilters();
}

function resetFilters() {
  state.currentCycle = '';
  state.searchQuery = '';
  document.getElementById('search-input').value = '';
  var btns = document.querySelectorAll('.cycle-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].getAttribute('data-cycle') === '');
  }
  applyFilters();
}

function renderGoals(goals) {
  var area = document.getElementById('content-area');
  if (!goals || goals.length === 0) {
    area.innerHTML = renderEmpty();
    return;
  }
  var html = '';
  for (var i = 0; i < goals.length; i++) {
    html += renderOCard(goals[i], i);
  }
  area.innerHTML = html;
}

// ===== Cycle Tabs Builder =====
function buildCycleTabs(cycles) {
  var container = document.getElementById('cycle-tabs');
  var html = '<button class="cycle-btn active" data-cycle="" onclick="onCycleClick(\'\')">全部</button>';
  // 提取去重后的周期列表
  var seen = {};
  for (var i = 0; i < cycles.length; i++) {
    var c = cycles[i];
    if (c && !seen[c]) {
      seen[c] = true;
      html += '<button class="cycle-btn" data-cycle="' + escHtml(c) + '" onclick="onCycleClick(\'' + escHtml(c) + '\')">' + escHtml(c) + '</button>';
    }
  }
  container.innerHTML = html;
  state.cycles = Object.keys(seen);
}

// ===== HTML Escape =====
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ===== Main: Load Data =====
function loadData() {
  var area = document.getElementById('content-area');
  area.innerHTML = '<div class="state-box" id="state-loading"><div class="spinner"></div><h3>正在加载 OKR 数据</h3><p>从简道云获取目标和关键结果...</p></div>';

  // 并行请求 OKR 列表和选项数据
  Promise.all([
    apiGet('/api/okr/list'),
    apiGet('/api/okr/options').catch(function() { return { cycles: [] }; })
  ]).then(function(results) {
    var okrData = results[0];
    var optionsData = results[1];
    var goals = okrData.goals || [];

    state.allGoals = goals;

    // 提取周期列表
    var cycles = [];
    for (var i = 0; i < goals.length; i++) {
      if (goals[i].cycle) cycles.push(goals[i].cycle);
    }
    // 如果 options 提供了周期数据，合并进来
    if (optionsData.cycles) {
      for (var j = 0; j < optionsData.cycles.length; j++) {
        var c = optionsData.cycles[j];
        var cName = typeof c === 'string' ? c : (c.name || c.value || '');
        if (cName) cycles.push(cName);
      }
    }

    // Build UI
    buildCycleTabs(cycles);
    document.getElementById('kpi-strip').style.display = '';
    document.getElementById('filter-bar').style.display = '';

    // Update header
    var totalKR = 0;
    for (var k = 0; k < goals.length; k++) {
      totalKR += (goals[k].krs || []).length;
    }
    document.getElementById('page-sub').innerHTML = goals.length + ' 个目标 / ' + totalKR + ' 个关键结果';

    // Render
    state.filteredGoals = goals;
    renderGoals(goals);
    updateKPIs(goals);
    document.getElementById('filter-info').textContent = '显示 ' + goals.length + ' / ' + goals.length + ' 个目标';
    state.loading = false;

  }).catch(function(err) {
    console.error('Load failed:', err);
    area.innerHTML = renderError(err.message || '无法连接到 Bridge 服务，请确认服务已启动。');
    state.loading = false;
  });
}

// ===== Init =====
document.addEventListener('DOMContentLoaded', function() {
  loadData();
});
</script>
